services:
  firew2oai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: firew2oai
    restart: unless-stopped
    ports:
      - "${PORT:-39527}:39527"
    environment:
      - PORT=39527
      - API_KEY=${API_KEY:-sk-admin}
      - TIMEOUT=${TIMEOUT:-120}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:39527/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
